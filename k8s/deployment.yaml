apiVersion: apps/v1
kind: Deployment
metadata:
  name: xxterm-site
  namespace: xxterm
  labels:
    app: xxterm-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xxterm-site
  template:
    metadata:
      labels:
        app: xxterm-site
    spec:
      containers:
        - name: xxterm-site
          image: xxterm-site:latest   # 替换为实际镜像地址，如 registry.example.com/xxterm-site:latest
          imagePullPolicy: IfNotPresent  # 本地镜像存在则不拉取，避免 latest 标签默认 Always 去远程拉取
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
